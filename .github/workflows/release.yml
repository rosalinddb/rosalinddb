name: release image

# Builds the root Dockerfile multi-arch (linux/amd64,linux/arm64) and publishes
# the one backend image every service runs from.
#
#   - GHCR (ghcr.io/rosalinddb/rosalinddb) — ALWAYS pushed, using the built-in
#     GITHUB_TOKEN (needs `permissions: packages: write`).
#   - Docker Hub (docker.io/rosalinddb/rosalinddb) — ONLY when a DOCKERHUB_TOKEN
#     secret is configured. Absent secret => Docker Hub login + the docker.io tag
#     set are skipped cleanly and the job is still green (GHCR-only path).
#
# Triggers:
#   - push tag `v*`  -> semver tags (X.Y.Z, X.Y) + `latest`.
#   - push to main   -> the rolling `edge` tag.
#   - workflow_dispatch -> manual run. Semver patterns are inert off-tag and
#     `edge`/`latest` are main/tag-only, so dispatch (and any other branch run)
#     falls back to the always-present `sha-<short>` tag plus the branch-name
#     tag — every run still produces a usable, pushable image.

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  GHCR_IMAGE: ghcr.io/rosalinddb/rosalinddb
  DOCKERHUB_IMAGE: docker.io/rosalinddb/rosalinddb

jobs:
  image:
    name: build & push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Secrets cannot be referenced directly in a step-level `if:`, so funnel
      # the presence of the Docker Hub credentials through a step output boolean
      # that the later Docker Hub steps / metadata `enable=` guard read. Both
      # the username AND the token are required — the login step needs both, so
      # gate on both to avoid a half-configured push attempt.
      - name: Detect Docker Hub credentials
        id: dockerhub
        run: echo "enabled=${{ secrets.DOCKERHUB_TOKEN != '' && secrets.DOCKERHUB_USERNAME != '' && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          # A stable literal is more robust than ${{ github.actor }} for
          # bot/API-triggered tag pushes: login-action accepts any username
          # when the password is the GITHUB_TOKEN.
          username: rosalinddb-ci
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # The docker.io image is dropped from the tag set when the secret is
          # absent, so build-push never attempts a Docker Hub push.
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }},enable=${{ steps.dockerhub.outputs.enabled == 'true' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            # Fallbacks so EVERY run produces at least one tag — without these a
            # workflow_dispatch (or any non-main, non-`v*` run) yields an empty
            # tag set (semver is inert off-tag, edge is main-only, latest is
            # tag-only), and build-push would have nothing to push. `type=sha`
            # always emits a `sha-<short>` tag; `type=ref,event=branch` emits
            # the branch name on branch builds.
            type=ref,event=branch
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Post-publish smoke. ONLY on release tags (v*): pulls the JUST-PUBLISHED image
  # and brings the real compose stack up to prove the deploy path end to end
  # (pull -> up -> health -> dataset -> ingest -> async index -> query). Free on a
  # public repo; runs on release tags (pulls the semver image) and on manual
  # workflow_dispatch (pulls `edge`), so routine `main` pushes stay fast but you
  # can verify the deploy path on demand without cutting a tag. Runs after the
  # image job so the tag exists in the registry to pull.
  smoke:
    name: pull & smoke the published image
    needs: image
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # On a release tag (v0.1.0 -> 0.1.0) smoke the published semver image that
      # docker-compose.yml pins via ${RB_IMAGE_TAG}; on a manual dispatch there is
      # no version, so smoke the `edge` image the image job just pushed.
      - name: Resolve published image tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "RB_IMAGE_TAG=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          else
            echo "RB_IMAGE_TAG=edge" >> "$GITHUB_ENV"
          fi

      # A freshly-published GHCR package is private until made public, so log in
      # (read scope) to pull it from the runner regardless of package visibility.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: rosalinddb-ci
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and start the published stack
        run: |
          docker compose pull
          docker compose up -d

      - name: Wait for the control plane to be healthy
        run: |
          for _ in $(seq 1 60); do
            if [ "$(curl -fsS -o /dev/null -w '%{http_code}' http://localhost:8080/healthz || true)" = "200" ]; then
              echo "control plane healthy"; exit 0
            fi
            sleep 3
          done
          echo "::error::stack did not become healthy in time"
          docker compose ps
          docker compose logs --tail=80
          exit 1

      - name: Smoke (health -> dataset -> ingest -> index -> query)
        run: python scripts/smoke.py --base-url http://localhost:8080

      - name: Tear down
        if: always()
        run: docker compose down -v
