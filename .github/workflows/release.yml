name: release image

# Builds the root Dockerfile multi-arch (linux/amd64,linux/arm64) and publishes
# the one backend image every service runs from.
#
#   - GHCR (ghcr.io/rosalinddb/rosalinddb) — ALWAYS pushed, using the built-in
#     GITHUB_TOKEN (needs `permissions: packages: write`).
#   - Docker Hub (docker.io/rosalinddb/rosalinddb) — ONLY when a DOCKERHUB_TOKEN
#     secret is configured. Absent secret => Docker Hub login + the docker.io tag
#     set are skipped cleanly and the job is still green (GHCR-only path).
#
# Triggers:
#   - push tag `v*`  -> semver tags (X.Y.Z, X.Y) + `latest`.
#   - push to main   -> the rolling `edge` tag.
#   - workflow_dispatch -> manual run (publishes `edge` from main, or nothing
#     special from a feature branch — semver patterns are inert off-tag).

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  GHCR_IMAGE: ghcr.io/rosalinddb/rosalinddb
  DOCKERHUB_IMAGE: docker.io/rosalinddb/rosalinddb

jobs:
  image:
    name: build & push multi-arch image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Secrets cannot be referenced directly in a step-level `if:`, so funnel
      # the presence of DOCKERHUB_TOKEN through a step output boolean that the
      # later Docker Hub steps / metadata `enable=` guard read.
      - name: Detect Docker Hub credentials
        id: dockerhub
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: echo "enabled=${{ secrets.DOCKERHUB_TOKEN != '' && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: steps.dockerhub.outputs.enabled == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # The docker.io image is dropped from the tag set when the secret is
          # absent, so build-push never attempts a Docker Hub push.
          images: |
            ${{ env.GHCR_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE }},enable=${{ steps.dockerhub.outputs.enabled == 'true' }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
