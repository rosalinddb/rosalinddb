# RosalindDB — self-host docker compose stack.
#
# THE HEADLINE PORTABLE INSTALL PATH. `docker compose up` PULLS the published
# image (`ghcr.io/rosalinddb/rosalinddb:${RB_IMAGE_TAG:-0.1.0}`) — no
# clone+build needed — and comes up healthy with a single public origin at
# `http://localhost:8080`, against which `python -m scripts.smoke` passes.
# Contributors who want the from-source build path use the
# `docker-compose.build.yml` override (or `make run-local`); see the note on
# the app services below.
#
# IMAGE MUST EXIST FIRST. A plain `docker compose up` PULLS the tag below; it
# does not build. So the image has to have been published once before this
# works: the `release image` workflow (.github/workflows/release.yml) does
# that — push to `main` publishes the rolling `edge` tag; pushing a `vX.Y.Z`
# tag publishes `X.Y.Z` + `X.Y` + `latest`. The pinned default here is `0.1.0`
# (set by tag `v0.1.0`). Override the whole tag with `RB_IMAGE_TAG`, e.g.
# `RB_IMAGE_TAG=edge docker compose up` to run the latest main build, or use
# the `docker-compose.build.yml` override to build the image from source.
# `RB_IMAGE_TAG` is the SINGLE source for the tag across all services here and
# in docker-compose.build.yml.
#
# Topology mirrors a typical CP/DP split. The public/private network
# isolation is provided by the Docker compose network (or your container
# orchestrator — Docker network, k8s namespace, etc.):
#
#   redis           Reliable queue + ephemeral result store + (when enabled)
#                   rate-limiter coordination. `redis:7-alpine`.
#   minio           S3-compatible object storage for landing data + FAISS index
#                   shards. Any S3-compatible store (MinIO for local/CI;
#                   AWS S3, GCS, R2, etc. in other environments).
#   createbuckets   One-shot mc bootstrap (`vectors` bucket + public policy).
#   postgres        The catalog (any Postgres). Local dev uses the bundled
#                   `postgres:15` container.
#   pgvector        Recall-tier data-plane instance — a SEPARATE
#                   `pgvector/pgvector:pg15` Postgres, isolated from `postgres`
#                   above. DEFAULT OFF: starts healthy but nothing connects to
#                   it unless `RB_RECALL_DSN` is set (host port 5433). See
#                   docs/architecture/recall-consolidate.md.
#   migrator        One-shot `python -m scripts.migrate` that runs the schema
#                   migration to completion before any app container starts.
#                   Replaces the in-process auto-migrate pattern that required
#                   `RB_SKIP_MIGRATE=1` workarounds in earlier configurations.
#   cp              `services.control_plane.cp_app:app`. The ONLY service with
#                   a host port — the single public origin a self-hoster's
#                   client points at. Hosts auth, `/v1/datasets*`, ingest, the
#                   bulk-import surface, and reverse-proxies `/v1/query` to
#                   `query_dp`. Stateless.
#   query_dp        `services.query_api.dp_app:app`. PRIVATE to the compose
#                   network (no host port) — reachable only via the CP proxy.
#                   Runs the FAISS search.
#   validator       `services.validator_worker.run`. Queue-driven, private.
#   index_builder   `services.index_builder.run`. Queue-driven, private.
#   ephemeral_runner `services.ephemeral_runner.run`. Queue-driven, private.
#
# All Python services run the one published image
# (`ghcr.io/rosalinddb/rosalinddb:${RB_IMAGE_TAG:-0.1.0}`); per-service
# `command:` overrides select the process role. The default path PULLS this
# image (which therefore must already be published — see the IMAGE MUST EXIST
# FIRST note at the top). To build it from the root `Dockerfile` instead, layer
# the build override:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
#
# Dev defaults below (postgres/postgres, minio/minio123, JWT_SECRET=dev-secret)
# are for LOCAL DEVELOPMENT ONLY. For a real self-host install, override via
# an `.env` file or a compose override — never deploy these to a public host.
#
# Quotas are opt-in via `RB_ENABLE_QUOTAS`. Default is OFF (this file does NOT
# set it) so a self-hoster's own queries are never throttled. A deployment that
# wants per-tenant limits turns it on by exporting `RB_ENABLE_QUOTAS=true`.

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
      # CORS for the bulk-import flow: a browser client POSTs the
      # staged file *directly* to MinIO via a presigned upload, so MinIO must
      # answer the cross-origin preflight. In dev the Next.js dev server
      # picks a localhost port, so the whole localhost origin range is
      # allowed. In production set this to your client origin(s).
      MINIO_API_CORS_ALLOW_ORIGIN: "http://localhost:3000,http://localhost:3001,http://localhost:3002"
    command: server /data --console-address :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10

  createbuckets:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh -c
    command: >
      "mc alias set local http://minio:9000 minio minio123 &&
       mc mb -p local/vectors || true &&
       mc anonymous set public local/vectors || true"

  postgres:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: vectors
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vectors"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Recall tier — a SEPARATE data-plane pgvector instance, NOT the
  # control-plane `postgres` above. The recall tier ships behind `RB_RECALL`
  # / `RB_RECALL_DSN`, both DEFAULT OFF (see docs/architecture/recall-consolidate.md).
  # This container is kept off the control-plane Postgres on purpose: a tenant
  # write-storm against the recall tier must not starve the metadata reads on
  # every query's critical path ("Blast radius & control/data-plane isolation").
  #
  # DEFAULT-OFF SAFETY: this service starts and goes healthy, but NOTHING
  # connects to it unless `RB_RECALL_DSN` is set — every app service below
  # defaults `RB_RECALL_DSN` to empty (`${RB_RECALL_DSN:-}`), and the code treats
  # blank/unset as "recall tier off" (no connection opened). So a flag-off
  # `docker compose up` and all existing services behave byte-identically to
  # today; this is just an extra idle, healthy container that no service depends
  # on. To enable the recall tier, export
  # `RB_RECALL_DSN=postgresql://postgres:postgres@pgvector:5432/recall` (the value
  # commented in `.env.example`). Distinct host port (5433) so it never clashes
  # with the control-plane Postgres on 5432.
  #
  # Dev defaults (postgres/postgres) are for LOCAL DEVELOPMENT ONLY, identical to
  # the control-plane `postgres` service — override for any real deploy.
  pgvector:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: recall
    ports:
      - "5433:5432"
    volumes:
      - ./data/pgvector:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d recall"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot schema migrator. Runs once on `docker compose up`, applies the
  # schema, exits 0. Every long-running app service waits on this via
  # `depends_on: { migrator: { condition: service_completed_successfully } }`
  # so the app never boots against an un-migrated catalog. Replaces the
  # in-process auto-migrate that needed `RB_SKIP_MIGRATE=1` workarounds.
  migrator:
    image: ghcr.io/rosalinddb/rosalinddb:${RB_IMAGE_TAG:-0.1.0}
    # Cold-boot race: on a fresh volume Postgres flips between "accepting
    # connections" / "rejecting connections" during its first-time initdb /
    # superuser-create phase, so `pg_isready` (the healthcheck) can report
    # healthy before the catalog can actually serve a real query. Sleep for
    # the first connection to land, then run migrate. `migrate()` itself is
    # idempotent (pg_advisory_xact_lock + version ledger) so a re-run is a
    # cheap no-op once the schema is current.
    command:
      - "sh"
      - "-c"
      - |
        echo "migrator: waiting for postgres to accept connections..."
        for i in $$(seq 1 30); do
          python -c "import psycopg2, os; psycopg2.connect(os.environ['DATABASE_URL']).close()" 2>/dev/null && break
          sleep 1
        done
        if [ -n "$$RB_RECALL_DSN" ]; then
          echo "migrator: RB_RECALL_DSN set — waiting for the recall pgvector instance..."
          recall_ok=0
          for i in $$(seq 1 30); do
            python -c "import psycopg2, os; psycopg2.connect(os.environ['RB_RECALL_DSN']).close()" 2>/dev/null && recall_ok=1 && break
            sleep 1
          done
          if [ "$$recall_ok" != "1" ]; then
            echo "migrator: RB_RECALL_DSN is set but the recall pgvector instance was unreachable after 30 tries — failing loudly." >&2
            exit 1
          fi
        fi
        exec python -m scripts.migrate
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vectors
      # Recall-tier DSN. DEFAULT EMPTY -> the recall tier is OFF: `migrate_recall()`
      # is a pure no-op (no connection opened, schema untouched), so a flag-off
      # `docker compose up` is byte-identical to today. Set `RB_RECALL_DSN` (see
      # `.env.example`) to point at the `pgvector` service and migrate its schema.
      RB_RECALL_DSN: "${RB_RECALL_DSN:-}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # Control Plane — the single public origin. Auth, /v1/datasets*, ingest,
  # the bulk-import surface, and the /v1/query reverse proxy live here.
  # Self-hoster's client (CLI, SDK, dashboard) points at http://localhost:8080.
  cp:
    image: ghcr.io/rosalinddb/rosalinddb:${RB_IMAGE_TAG:-0.1.0}
    command:
      [
        "uvicorn",
        "services.control_plane.cp_app:app",
        "--host", "0.0.0.0",
        "--port", "8080",
      ]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vectors
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_REGION: us-east-1
      LANDING_PREFIX: s3://vectors/landing
      INDEXES_PREFIX: s3://vectors/indexes
      # OSS-vs-SaaS gates. Pass through from the shell / .env so a
      # self-hoster can flip them with `RB_REQUIRE_AUTH=true docker compose up`
      # without editing this file. Defaults match the OSS-friendly story:
      # auth OFF, quotas OFF, JWT secret a known dev value (a real deploy
      # MUST override JWT_SECRET — see .env.example).
      JWT_SECRET: "${JWT_SECRET:-dev-secret}"
      RB_REQUIRE_AUTH: "${RB_REQUIRE_AUTH:-false}"
      RB_ENABLE_QUOTAS: "${RB_ENABLE_QUOTAS:-false}"
      # The CP reverse-proxies POST /v1/query to this DP base URL. The DP has
      # no host port — it is reachable only by service name on the compose
      # network.
      QUERY_DP_URL: http://query_dp:8080
      # Recall tier DSN — the synchronous read-your-writes path will
      # UPSERT here. DEFAULT EMPTY -> recall tier OFF: the code treats blank/unset
      # as "off" and never connects, so the CP behaves byte-identically to today.
      # Set `RB_RECALL_DSN` (see `.env.example`) to enable. The consolidation
      # worker that later drains this also reads `RB_RECALL` (master switch,
      # default off).
      RB_RECALL_DSN: "${RB_RECALL_DSN:-}"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  # Query Data Plane — private to the compose network (no host port). The CP
  # is the only thing that talks to this; a self-hoster's traffic always
  # arrives via the CP at :8080.
  query_dp:
    image: ghcr.io/rosalinddb/rosalinddb:${RB_IMAGE_TAG:-0.1.0}
    command:
      [
        "uvicorn",
        "services.query_api.dp_app:app",
        "--host", "0.0.0.0",
        "--port", "8080",
      ]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vectors
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_REGION: us-east-1
      LANDING_PREFIX: s3://vectors/landing
      INDEXES_PREFIX: s3://vectors/indexes
      JWT_SECRET: "${JWT_SECRET:-dev-secret}"
      RB_REQUIRE_AUTH: "${RB_REQUIRE_AUTH:-false}"
      RB_ENABLE_QUOTAS: "${RB_ENABLE_QUOTAS:-false}"
      # Recall tier DSN — the query union will brute-force-search here
      # for rows newer than the resolved shard's watermark. DEFAULT EMPTY ->
      # recall tier OFF: the DP never connects and the query path is the pure
      # consolidated path, byte-identical to today. Set `RB_RECALL_DSN` (see
      # `.env.example`).
      RB_RECALL_DSN: "${RB_RECALL_DSN:-}"
      # Shard read-through cache. Points at a path that is writable by the
      # image's uid 10001 (`/home/rosalind/cache` is chown'd in the
      # Dockerfile). The cache is ephemeral by design: it lives inside the
      # container filesystem, gets warmed on first cold query, and is gone
      # on `docker compose down`. Re-warm takes seconds.
      CACHE_DIR: /home/rosalind/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  validator:
    image: ghcr.io/rosalinddb/rosalinddb:${RB_IMAGE_TAG:-0.1.0}
    command: ["python", "-m", "services.validator_worker.run"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vectors
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_REGION: us-east-1
      LANDING_PREFIX: s3://vectors/landing
      INDEXES_PREFIX: s3://vectors/indexes
      JWT_SECRET: "${JWT_SECRET:-dev-secret}"
      RB_REQUIRE_AUTH: "${RB_REQUIRE_AUTH:-false}"
      RB_ENABLE_QUOTAS: "${RB_ENABLE_QUOTAS:-false}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  index_builder:
    image: ghcr.io/rosalinddb/rosalinddb:${RB_IMAGE_TAG:-0.1.0}
    command: ["python", "-m", "services.index_builder.run"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vectors
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_REGION: us-east-1
      LANDING_PREFIX: s3://vectors/landing
      INDEXES_PREFIX: s3://vectors/indexes
      JWT_SECRET: "${JWT_SECRET:-dev-secret}"
      RB_REQUIRE_AUTH: "${RB_REQUIRE_AUTH:-false}"
      RB_ENABLE_QUOTAS: "${RB_ENABLE_QUOTAS:-false}"
      # Recall tier DSN — consolidation (= compaction) will drain rows from
      # here into a FAISS shard, then advance the shard's `consolidated_lsn`
      # watermark. DEFAULT EMPTY -> recall tier OFF: the builder never connects
      # and runs its existing landing->shard path unchanged, byte-identical to
      # today. Set `RB_RECALL_DSN` (see `.env.example`) to enable consolidation.
      RB_RECALL_DSN: "${RB_RECALL_DSN:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped

  ephemeral_runner:
    image: ghcr.io/rosalinddb/rosalinddb:${RB_IMAGE_TAG:-0.1.0}
    command: ["python", "-m", "services.ephemeral_runner.run"]
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/vectors
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio123
      S3_REGION: us-east-1
      LANDING_PREFIX: s3://vectors/landing
      INDEXES_PREFIX: s3://vectors/indexes
      JWT_SECRET: "${JWT_SECRET:-dev-secret}"
      RB_REQUIRE_AUTH: "${RB_REQUIRE_AUTH:-false}"
      RB_ENABLE_QUOTAS: "${RB_ENABLE_QUOTAS:-false}"
      # Shard read-through cache. Points at the path the Dockerfile chowns
      # to uid 10001; see the matching comment on `query_dp` above.
      CACHE_DIR: /home/rosalind/cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
    restart: unless-stopped
